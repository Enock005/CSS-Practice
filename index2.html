<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Contact page</title>
</head>
<body>
    <div class="container">

        <div class="contact-form">
            <h2>Contact Us</h2>

            <div class="row">
                <div class="field">
                    <label for="fullname">FULL NAME</label>
                    <input type="text" id="fullname">
                </div>

                <div class="field">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email">
                </div>
            </div>

            <label for="subject">SUBJECT</label>
            <input type="text" id="subject">

            <label for="message">MESSAGE</label>
            <textarea id="message" placeholder="Message"></textarea>

            <button>Send Message</button>
        </div>
        <div class="map">
           <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2503345.0294716563!2d5.27937025!3d52.21299185!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c609c3db87e4bb%3A0xb3a175ceffbd0a9f!2sNetherlands!5e0!3m2!1sen!2smw!4v1774144241945!5m2!1sen!2smw" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

    </div>

<div class="container2">

    <div class="contact-info"> 
        <h1><b> Contact Us</b></h1>

        <p>Lorem ipsum dolor sit amet consectetur <br> 
            adipisicing elit. Iusto libero autem <br>
            obcaecati doloribus, error numquam, <br>
            Facere sed numquam corrupti illo?</p>

        <div class="icons">          
            <i class="fa-solid fa-phone"></i> 
            <span class="value">+1 213 555-0123</span>
        </div>
        
        <div class="icons">
            <i class="fa-solid fa-envelope"></i>
            <span class="value">info@enockmhura.com</span>
        </div>

        <div class="icons">
            <i class="fa-solid fa-location-dot"></i>
            <span class="value">2014 Forest Hills, Fayetteville,<br> United States</span>
        </div>
    </div>

    <div class="contact-form2">
        <div class="field2">
            <label>Name</label>
            <input type="text">
        </div>  

        <div class="field2">
            <label>Email</label>
            <input type="email">
        </div>

        <div class="field2">
            <label>Message</label>
            <textarea></textarea>
        </div>

        <button>Send message</button>
    </div>

</div>
       
</body>
</html>
