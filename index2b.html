<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles2b.css">
    <title>Contact forms</title>
</head>
<body>

    <!--First form-->
    <div class="main">
        <div class="container">
            <h2 class="heading">Quick Example</h2>
            <div class="form">
                <label for="email">Email address</label><br>
                <input type="email" name="email" id="email" placeholder="Enter email"><br>

                <label for="password">Password</label><br>
                <input type="password" name="password" id="password" placeholder="Password"><br>

                <label for="input">File input</label><br>
                <button>Choose File</button>
                <p>No file chosen</p><br>

                <small class="help-text">
                    (File must be pdf, png or jpeg)
                </small><br>

                <div class="check2">
                    <input type="checkbox" name="check" value="check">
                    <label for="check">Check me out</label><br>
                </div>

                <button class="submit-button">Submit</button>
            </div>
        </div>
    </div>

    <!--Second form-->
    <div class="main2">
        <div class="container-2">
            <h2 class="heading2">Horizontal Form</h2>
            <div class="form2">

                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="email"><br>

                <label for="password">Password</label>
                <input type="text" name="password" id="password" placeholder="password"> <br>

                <input type="checkbox" name="remember">
                <label for="remember">Remember me</label>

                <div class="line-below"></div>

                <div class="buttons">
                    <button class="cancel">Cancel</button>
                    <button class="sign-in">Sign in</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
